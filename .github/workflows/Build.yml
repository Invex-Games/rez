name: Build

on:
  push:
    branches: [ main, feature/**, patch/** ]
  release:
    types: [ released ]
  workflow_dispatch:

permissions: { }

jobs:

  SetupBuildInfo:
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.SetupBuildInfo.outputs.build-name }}
      build-id: ${{ steps.SetupBuildInfo.outputs.build-id }}
      build-version: ${{ steps.SetupBuildInfo.outputs.build-version }}
      build-timestamp: ${{ steps.SetupBuildInfo.outputs.build-timestamp }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: SetupBuildInfo
        id: SetupBuildInfo
        run: dotnet run --project _atom/_atom.csproj -- SetupBuildInfo --skip --headless

  PackProjects:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: PackProjects
        id: PackProjects
        run: dotnet run --project _atom/_atom.csproj -- PackProjects --skip --headless

      - name: Store Invex.Rez
        uses: actions/upload-artifact@v7
        with:
          name: Invex.Rez
          path: '${{ github.workspace }}/.github/publish/Invex.Rez'

      - name: Store Invex.Rez.Configuration
        uses: actions/upload-artifact@v7
        with:
          name: Invex.Rez.Configuration
          path: '${{ github.workspace }}/.github/publish/Invex.Rez.Configuration'

  TestProjects:
    runs-on: ${{ matrix.job-runs-on }}
    strategy:
      matrix:
        test-framework: [ net8.0, net9.0, net10.0 ]
        job-runs-on: [ ubuntu-latest, windows-latest ]
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup .NET 8.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: TestProjects
        id: TestProjects
        run: dotnet run --project _atom/_atom.csproj -- TestProjects --skip --headless
        env:
          test-framework: ${{ matrix.test-framework }}
          job-runs-on: ${{ matrix.job-runs-on }}
          build-slice: '${{ matrix.test-framework }}-${{ matrix.job-runs-on }}'

      - name: Store Invex.Rez.Tests
        uses: actions/upload-artifact@v7
        with:
          name: 'Invex.Rez.Tests-${{ matrix.test-framework }}-${{ matrix.job-runs-on }}'
          path: '${{ github.workspace }}/.github/publish/Invex.Rez.Tests'

  TestFxProjects:
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: TestFxProjects
        id: TestFxProjects
        run: dotnet run --project _atom/_atom.csproj -- TestFxProjects --skip --headless

      - name: Store Invex.Rez.Tests
        uses: actions/upload-artifact@v7
        with:
          name: Invex.Rez.Tests
          path: '${{ github.workspace }}/.github/publish/Invex.Rez.Tests'

  PushToNuget:
    needs: [ TestProjects, TestFxProjects, PackProjects, SetupBuildInfo ]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve Invex.Rez
        uses: actions/download-artifact@v8
        with:
          name: Invex.Rez
          path: '${{ github.workspace }}/.github/artifacts/Invex.Rez'

      - name: Retrieve Invex.Rez.Configuration
        uses: actions/download-artifact@v8
        with:
          name: Invex.Rez.Configuration
          path: '${{ github.workspace }}/.github/artifacts/Invex.Rez.Configuration'

      - name: PushToNuget
        id: PushToNuget
        run: dotnet run --project _atom/_atom.csproj -- PushToNuget --skip --headless
        env:
          build-id: ${{ needs.SetupBuildInfo.outputs.build-id }}
          nuget-push-api-key: ${{ secrets.NUGET_PUSH_API_KEY }}

  PushToRelease:
    permissions:
      contents: write
    needs: [ TestProjects, PackProjects, SetupBuildInfo ]
    if: contains(needs.SetupBuildInfo.outputs.build-version, '-') == false
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve Invex.Rez
        uses: actions/download-artifact@v8
        with:
          name: Invex.Rez
          path: '${{ github.workspace }}/.github/artifacts/Invex.Rez'

      - name: Retrieve Invex.Rez.Configuration
        uses: actions/download-artifact@v8
        with:
          name: Invex.Rez.Configuration
          path: '${{ github.workspace }}/.github/artifacts/Invex.Rez.Configuration'

      - name: PushToRelease
        id: PushToRelease
        run: dotnet run --project _atom/_atom.csproj -- PushToRelease --skip --headless
        env:
          build-version: ${{ needs.SetupBuildInfo.outputs.build-version }}
          build-id: ${{ needs.SetupBuildInfo.outputs.build-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  BuildDocs:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: BuildDocs
        id: BuildDocs
        run: dotnet run --project _atom/_atom.csproj -- BuildDocs --skip --headless

      - name: Store GeneratedDocs
        uses: actions/upload-artifact@v7
        with:
          name: GeneratedDocs
          path: '${{ github.workspace }}/.github/publish/GeneratedDocs'

  PublishDocs:
    permissions:
      contents: write
    needs: [ SetupBuildInfo, BuildDocs ]
    if: contains(needs.SetupBuildInfo.outputs.build-version, '-') == false
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve GeneratedDocs
        uses: actions/download-artifact@v8
        with:
          name: GeneratedDocs
          path: '${{ github.workspace }}/.github/artifacts/GeneratedDocs'

      - name: PublishDocs
        id: PublishDocs
        run: dotnet run --project _atom/_atom.csproj -- PublishDocs --skip --headless
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}

